name: Fetch Market Data

on:
  schedule:
    # 한국 장중: KST 09:00 ~ 15:40 (UTC 00:00 ~ 06:40), 평일
    - cron: '0,20,40 0,1,2,3,4,5,6 * * 1-5'
    # 미국 장중: KST 22:00 ~ 05:00 (UTC 13:00 ~ 21:00), 평일
    - cron: '0,20,40 13,14,15,16,17,18,19,20 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  fetch-market:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas

      - name: Fetch market data
        run: python scripts/fetch_market.py

      - name: Commit and push market.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add market.json
          git diff --staged --quiet || git commit -m "chore: update market.json $(date -u +%Y-%m-%dT%H:%M)"
          git push